<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRUD Test Runner</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        button { padding: 10px 20px; background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background: #0056b3; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        .results { margin-top: 20px; }
        .passed { color: green; }
        .failed { color: red; }
        .error { background: #f8d7da; border: 1px solid #f5c6cb; padding: 10px; margin: 10px 0; border-radius: 4px; }
        .success { background: #d4edda; border: 1px solid #c3e6cb; padding: 10px; margin: 10px 0; border-radius: 4px; }
        pre { background: #f8f9fa; padding: 10px; border-radius: 4px; overflow-x: auto; }
    </style>
</head>
<body>
    <h1>Comprehensive CRUD Test Runner</h1>
    <p>This will test all CRUD operations for all entities in the QMetrix app. Make sure you're logged in to the app first.</p>
    <p><strong>Warning:</strong> This will create and delete test data. Only run this in a development environment.</p>

    <button id="runTests">Run All CRUD Tests</button>

    <div class="results" id="results"></div>

    <script type="module">
        const runTestsBtn = document.getElementById('runTests');
        const resultsDiv = document.getElementById('results');

        runTestsBtn.addEventListener('click', async () => {
            runTestsBtn.disabled = true;
            runTestsBtn.textContent = 'Running Tests...';
            resultsDiv.innerHTML = '<p>Starting tests...</p>';

            try {
                // Import the test function from the main app
                const { runComprehensiveCRUDTests } = await import('./src/lib/comprehensiveTestSuite.js');

                const results = await runComprehensiveCRUDTests();

                displayResults(results);
            } catch (error) {
                resultsDiv.innerHTML = `<div class="error">Test suite failed to load: ${error.message}</div>`;
                console.error('Test error:', error);
            } finally {
                runTestsBtn.disabled = false;
                runTestsBtn.textContent = 'Run All CRUD Tests';
            }
        });

        function displayResults(results) {
            let html = '<h2>Test Results</h2>';

            html += `<div class="success">Passed: ${results.passed?.length || 0}</div>`;
            html += `<div class="error">Failed: ${results.failed?.length || 0}</div>`;

            if (results.passed && results.passed.length > 0) {
                html += '<h3 class="passed">Passed Tests</h3><ul>';
                results.passed.forEach(entity => {
                    html += `<li class="passed">${entity}</li>`;
                });
                html += '</ul>';
            }

            if (results.failed && results.failed.length > 0) {
                html += '<h3 class="failed">Failed Tests</h3>';
                results.failed.forEach(failure => {
                    html += `<div class="error">
                        <strong>${failure.entity}</strong>: ${failure.error}
                    </div>`;
                });
            }

            resultsDiv.innerHTML = html;
        }
    </script>
</body>
</html>
